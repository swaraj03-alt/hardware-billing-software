:root{

}

#calc-display{
    background:#0f172a;
    color:#fff;
    font-size:22px;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    text-align:right;
    font-weight:700;
    overflow:hidden;
}

.calc-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
}

.calc-btn{

    padding:10px;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
}

.calc-btn:hover{

}

.calc-btn.eq{
    background:#10b981;
}

.calc-btn.zero{
    grid-column:span 2;
}

table.items th:nth-child(1),
table.items td:nth-child(1){ width:40%; }

table.items th:nth-child(2),

table.items td.amt{

/* RESET */
*{box-sizing:border-box}
body{
    margin:0;
    font-family:'Plus Jakarta Sans',sans-serif;
    background:var(--bg);
}

/* =============================
   MAIN LAYOUT (SIDEBAR SYNC)
============================= */
.main{
    margin-left:230px;
    padding:20px;
    transition:.3s;
}

/* sidebar collapsed */
.sidebar.collapsed ~ .main{
    margin-left:68px;
}

/* tablet */
@media(max-width:1024px){
    .main{
        margin-left:0;
        margin-top:70px;
        padding:16px;
    }
}

/* mobile */
@media(max-width:600px){
    .main{
        padding:12px;
    }
}

table.items{
    width:100%;
    border-collapse:collapse;
    min-width:520px;
    table-layout:fixed;   /* ✅ prevent shrink */
}


table.items tbody{
    display:table-row-group;   /* reset */
}

/* =============================
   HEADER
============================= */
.bill-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
}

.bill-header h2{
    font-size:20px;
    margin:0;
}

/* mobile header */
@media(max-width:600px){
    .bill-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .bill-header h2{
        font-size:18px;
    }
}

/* =============================
   GRID INPUTS
============================= */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:16px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

label{
    font-size:10px;
    font-weight:800;
    color:#64748b;
    text-transform:uppercase;
}

input,select{
    padding:9px;
    border:1.5px solid var(--border);
    border-radius:8px;
    font-weight:600;
    font-size:13px;
}

/* laptop */
@media(max-width:1200px){
    .grid{grid-template-columns:repeat(3,1fr);}
}

/* tablet */
@media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr);}
}

/* mobile */
@media(max-width:600px){
    .grid{grid-template-columns:1fr;}
}

/* =============================
   TABLE
============================= */
..table-container{
    overflow-x:auto;
    overflow-y:visible;
    position:relative;
    z-index:5;   /* 👈 ensure dropdown layer above button */
}

table.items{
    width:100%;
    border-collapse:collapse;
    min-width:520px;
}
table.items{
    position:relative;
    z-index:1;
}

table.items td{
    padding:6px;
    vertical-align:middle;
    height:42px;   /* ✅ stable row height */
}


/* mobile summary */
@media(max-width:600px){
    .summary{
        flex-direction:column;
        text-align:center;
        font-size:16px;
    }
}

/* =============================
   BUTTON GRID
============================= */
.btn-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:14px;
}

table.items td{
    padding:6px;
    position:relative;   /* ✅ important */
}

.btn{
    border:none;
    padding:10px;
    border-radius:8px;
    font-weight:800;
    color:#fff;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    font-size:12px;
}

/* laptop */
@media(max-width:1100px){
    .btn-grid{grid-template-columns:repeat(3,1fr);}
}

/* tablet */
@media(max-width:768px){
    .btn-grid{grid-template-columns:repeat(2,1fr);}
}

/* mobile */
@media(max-width:480px){
    .btn-grid{grid-template-columns:1fr;}
}

/* =============================
   CALCULATOR
============================= */
.calc-side{
    position:fixed;
    right:18px;
    top:110px;
    width:260px;
    background:#1e293b;
    border-radius:12px;
    padding:12px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
    display:none;
    z-index:400;
}

/* tablet */
@media(max-width:992px){
    .calc-side{
        right:10px;
        bottom:20px;
        top:auto;
        width:230px;
    }
}

/* mobile */
@media(max-width:600px){
    .calc-side{
        width:94%;
        right:3%;
        bottom:10px;
    }
}

/* ============================
   SEARCH RESULT — FINAL STABLE
============================= */
.search-res{
    position:absolute;
    top:100%;
    left:0;
    width:100%;
    min-width:260px;

    background:#fff;
    border:1px solid var(--border);
    border-radius:8px;
    box-shadow:0 12px 28px rgba(0,0,0,0.18);

    z-index:10000;   /* higher than table */
    display:none;

    max-height:240px;
    overflow-y:auto;
}

.search-res div{
    padding:10px 12px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:2px;
    border-bottom:1px solid #f1f5f9;
}

.search-res div:last-child{
    border-bottom:none;
}

.search-res div:hover{
    background:#f8fafc;
}

.search-res span{
    font-weight:700;
    color:#0f172a;
    font-size:13px;
}

.search-res b{
    font-size:11px;
    color:#2563eb;
}

table.items thead th{
    position:sticky;
    top:0;
    background:#fff;
    z-index:2;
}

    <script>
        let EDIT_BILL_ID = "{{ edit_id }}";
       let BILL_ITEMS = {{ items|tojson if items else '[]' }};
    let BILL_DATA = {{ bill|tojson if bill else 'null' }};
    let cd = document.getElementById('calc-display');
    let lastStatus = "";
    function cInp(v){ if(cd.innerText=='0') cd.innerText=v; else cd.innerText+=v; }
    function cClr(){ cd.innerText='0'; }
    function cBack(){ cd.innerText=cd.innerText.slice(0,-1)||'0'; }
    function cRes(){ try{ cd.innerText=eval(cd.innerText); }catch{ cd.innerText='Error'; } }

    function toggleCalc(e){
        e.stopPropagation();
        let box=document.getElementById("calcBox");
        box.style.display = box.style.display==="block" ? "none":"block";
    }
        document.addEventListener("click", function(e){
    let box = document.getElementById("calcBox");
    let toggle = document.querySelector(".calc-toggle");

    if (!box.contains(e.target) && !toggle.contains(e.target)) {
        box.style.display = "none";
    }
});

    /* ===== NAME + MOBILE VALIDATION ===== */

    // Customer Name validation
    document.getElementById("cust_name").addEventListener("input", function () {
        let val = this.value;

        // allow only alphabets + space
        let cleaned = val.replace(/[^a-zA-Z\s]/g, "");

        if (val !== cleaned) {
            this.value = cleaned;
        }
    });

    // Mobile validation (allow digits only)
    document.getElementById("cust_mobile").addEventListener("input", function () {
        let val = this.value.replace(/\D/g, ""); // remove non digits
        this.value = val.slice(0, 10); // max 10 digits
    });

window.addEventListener("DOMContentLoaded", function(){

    if(EDIT_BILL_ID && BILL_ITEMS.length > 0){

        BILL_ITEMS.forEach(item => {

            addRow();

            let row = document.querySelector("#itemsTable tbody tr:last-child");

            row.querySelector(".pname").value = item.product_name;
            row.querySelector(".pid").value = item.product_id;
            row.querySelector(".qty").value = item.qty;
            row.querySelector(".unit").value = item.unit;
            row.querySelector(".rate").value = item.rate;

        });

        document.getElementById("hamali").value = BILL_DATA.hamali || 0;
        document.getElementById("bhada").value = BILL_DATA.bhada || 0;
        document.getElementById("paid").value = BILL_DATA.paid_amount || 0;

        document.getElementById("saved_bill_id").value = EDIT_BILL_ID;

        calcTotal();

    }else{
        addRow();
    }

});

    function searchProduct(inp){

        let q = inp.value.trim();
        let row = inp.closest("tr");
        let res = row.querySelector(".search-res");
        // close all other dropdowns
document.querySelectorAll(".search-res").forEach(d=>{
    if(d !== res) d.style.display="none";
});

        if(q.length < 1){
            res.style.display="none";
            return;
        }
    let billType = document.getElementById("billType").value;

fetch(`/api/search-product?q=${q}&type=${billType}`)
        .then(r => r.json())
        .then(data => {

            res.innerHTML = "";

            data.forEach(p => {

                let div = document.createElement("div");
                div.style.cursor = "pointer";

                div.innerHTML = `
                    <span>${p.product_name}</span>
                    <b style="color:${p.stock_quantity < 0 ? 'red':'#2563eb'}">
₹${p.selling_rate} | Stock ${p.stock_quantity}
</b>
                `;

                div.addEventListener("mousedown", function(e){
                    e.preventDefault();   // 🔥 prevent input blur

                    row.querySelector(".pname").value = p.product_name;
                    row.querySelector(".pid").value = p.id;
                    row.querySelector(".pPurchaseRate").value = p.purchase_price || 0;
                    let rateInput = row.querySelector("input.rate");
                    if(rateInput){
                        rateInput.value = p.selling_rate || 0;
                    }

                    row.dataset.stock = p.stock_quantity || 0;

                    let badge = row.querySelector(".profit-tag");
                    if(badge){
                        let profit = (p.selling_rate||0)-(p.purchase_price||0);
                        badge.innerHTML = `Profit ₹${profit.toFixed(2)} | Stock ${p.stock_quantity}`;
                        badge.style.display = "block";
                    }

                    res.style.display="none";
                    calcTotal();
                });

                res.appendChild(div);
            });

            res.style.display = "block";
        });
    }

  function calcTotal(){

    let sub = 0;

    document.querySelectorAll("#itemsTable tbody tr").forEach(r=>{

        let q = parseFloat(r.querySelector(".qty").value) || 0;
        let rate = parseFloat(r.querySelector(".rate").value) || 0;
        let stock = parseFloat(r.dataset.stock) || 0;
        let purchase = parseFloat(r.querySelector(".pPurchaseRate")?.value) || 0;

// stock info only (no restriction)
if(stock <= 0){
    let badge = r.querySelector(".profit-tag");
    if(badge){
        badge.innerHTML = `⚠ Out of Stock | Current: ${stock}`;
        badge.style.display = "block";
        badge.style.color = "#ef4444";
    }
}

        // amount
        let amt = q * rate;
        r.querySelector(".amt").innerText = amt.toFixed(2);
        sub += amt;

        // profit
        let unitProfit = rate - purchase;
        let totalProfit = unitProfit * q;

        let badge = r.querySelector(".profit-tag");
        if(badge && purchase > 0){
            badge.innerHTML = `Profit ₹${totalProfit.toFixed(2)} | Stock ${stock}`;
            badge.style.display = "block";
        }
    });

// ===== FINAL TOTAL SECTION =====
let hamali = parseFloat(document.getElementById("hamali").value) || 0;
let bhada  = parseFloat(document.getElementById("bhada").value) || 0;
let paid   = parseFloat(document.getElementById("paid").value) || 0;
let gstRate = parseFloat(document.getElementById("gstRate").value) || 0;

let total = sub + hamali + bhada;

// GST
let billType = document.getElementById("billType").value;
if(billType === "GST"){
    document.getElementById("gstBox").style.display = "grid";
    let gst = (total * gstRate) / 100;
    total += gst;

    document.getElementById("taxable").value = (total - gst).toFixed(2);
    document.getElementById("gst_amt").value = gst.toFixed(2);
}else{
    document.getElementById("gstBox").style.display = "none";
}

// 👉 SHOW TOTAL ONLY WHEN ITEMS PRESENT
let rows = document.querySelectorAll("#itemsTable tbody tr");
if(rows.length > 0 && sub > 0){
    document.getElementById("gTotal").innerText = total.toFixed(2);
    document.getElementById("bal").innerText = (total - paid).toFixed(2);

    let baki = total - paid;

    if(baki > 0){
        document.getElementById("bakiSummary").style.display="block";
        document.getElementById("bakiSummary").innerHTML =
            "Total: ₹"+total.toFixed(2)+" | Paid: ₹"+paid.toFixed(2)+" | Baki: ₹"+baki.toFixed(2);
    }else{
        document.getElementById("bakiSummary").style.display="none";
    }
}else{
    document.getElementById("gTotal").innerText = "0.00";
    document.getElementById("bal").innerText = "0.00";
    document.getElementById("bakiSummary").style.display="none";
}
}

    function validateBill(isDraft=false){

    let custInput = document.getElementById("cust_name");
    let cust = custInput.value.trim();

    // 👉 ONLY REQUIRE NAME IF NOT DRAFT
    if(!isDraft){
        if(cust === ""){
            alert("Enter customer name");
            custInput.focus();
            return false;
        }

        if(!/^[A-Za-z\s]+$/.test(cust)){
            alert("Customer name must contain only alphabets");
            custInput.focus();
            return false;
        }
    }

    // Mobile validation only if filled
    let mobInput = document.getElementById("cust_mobile");
    let mob = mobInput.value.trim();

    if(mob !== "" && !/^[6-9]\d{9}$/.test(mob)){
        alert("Enter valid 10 digit mobile number");
        mobInput.focus();
        return false;
    }

 // Items validation only if NOT draft
let rows = document.querySelectorAll("#itemsTable tbody tr");

if(!isDraft){

    if(rows.length === 0){
        alert("Add at least one item");
        return false;
    }

    for(let i=0;i<rows.length;i++){

        let r = rows[i];

        let name = r.querySelector(".pname").value.trim();
        let qty = parseFloat(r.querySelector(".qty").value) || 0;
        let rate = parseFloat(r.querySelector(".rate").value) || 0;

        if(name === ""){
            alert("Enter item name in row " + (i+1));
            r.querySelector(".pname").focus();
            return false;
        }

        if(qty <= 0){
            alert("Qty must be > 0 (row " + (i+1) + ")");
            r.querySelector(".qty").focus();
            return false;
        }

        if(rate <= 0){
            alert("Rate must be > 0 (row " + (i+1) + ")");
            r.querySelector(".rate").focus();
            return false;
        }
    }

}

    return true;
}


function finalProcess(status){

    let isDraft = (status === "PENDING");
    if(!validateBill(isDraft)) return;

    if(status==="BAKI"){
        let paid = parseFloat(document.getElementById("paid").value) || 0;
        if(paid <= 0){
            alert("Enter paid amount before BAKI");
            return;
        }
    }

    lastStatus = status;
    document.getElementById("status_val").value = status;

    let fd = new FormData(document.getElementById("billingForm"));

    let editId = document.getElementById("saved_bill_id").value;
    if(editId){
        fd.append("edit_bill_id", editId);
    }

    fetch("/save-bill",{method:"POST",body:fd})
    .then(r=>r.json())
.then(res=>{
    if(res.success){

        if(status !== "PENDING"){
            document.getElementById("saved_bill_id").value = res.bill_id;
        }else{
            document.getElementById("saved_bill_id").value = "";
        }

        alert("Bill Saved as " + (status==="PENDING" ? "Draft" : status));
        clearBilling();
        // ✅ DONE / NILL → OPEN RECEIPT + CLEAR
        if(status === "DONE"){

            // open receipt in new tab
            window.open("/print-bill/" + res.bill_id, "_blank");

            // clear billing for next bill
            clearBilling();
            window.location.reload();   // add this
        }

        }else{
            alert("Error: "+res.msg);
        }
    });
}

function processNill(){

    // get grand total
    let total = parseFloat(document.getElementById("gTotal").innerText) || 0;

    if(total <= 0){
        alert("Add items first");
        return;
    }

    // auto set paid = total
    document.getElementById("paid").value = total.toFixed(2);

    // recalc UI
    calcTotal();

    // save as DONE
    finalProcess('DONE');
}

function printBill(){
    let id=document.getElementById("saved_bill_id").value;

    if(!id){
        alert("Pending bill print nahi hota");
        return;
    }

    window.open("/print-bill/"+id,"_blank");

    clearBilling();
}

}

    document.getElementById("billType").addEventListener("change", function(){

        let type = this.value;

        // ✅ IF ESTIMATE → OPEN ESTIMATE PAGE
        if(type === "ESTIMATE"){
            window.location.href = "/estimate";
            return;
        }

        // GST UI toggle
        if(type === "GST"){
            document.getElementById("gstRate").parentElement.style.display = "flex";
        }else{
            document.getElementById("gstRate").parentElement.style.display = "none";
            document.getElementById("gstBox").style.display = "none";
        }

        calcTotal();
    });

function clearBilling(){

    // form reset
    document.getElementById("billingForm").reset();

    // items table clear
    document.querySelector("#itemsTable tbody").innerHTML="";

    // totals reset
    document.getElementById("gTotal").innerText="0.00";
    document.getElementById("bal").innerText="0.00";

    // baki summary hide
    document.getElementById("bakiSummary").style.display="none";

    // saved bill id clear
    document.getElementById("saved_bill_id").value="";

    // add fresh row
    addRow();
}
