{% include 'sidebar.html' %}

<style>
:root{
--bg:#f4f6fb;
--card:#ffffff;
--soft:#f8fafc;
--dark:#0f172a;
--muted:#64748b;
--primary:#2563eb;
--primary-soft:#eff6ff;
--danger:#ef4444;
--border:#e2e8f0;
--shadow:0 10px 30px rgba(15,23,42,.08);
}

*{
box-sizing:border-box;
}

body{
margin:0;
background:var(--bg);
font-family:'Plus Jakarta Sans',sans-serif;
}

.main-content{
margin-left:270px;
padding:28px;
min-height:100vh;
}

@media(max-width:1100px){
.main-content{
margin-left:0;
padding:88px 14px 20px;
}
}

.form-shell{
max-width:1100px;
margin:auto;
}

.page-header{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
margin-bottom:18px;
flex-wrap:wrap;
}

.page-title{
font-size:26px;
font-weight:800;
color:var(--dark);
display:flex;
align-items:center;
gap:10px;
}

.page-sub{
font-size:14px;
color:var(--muted);
margin-top:4px;
}

.form-card{
background:var(--card);
border-radius:24px;
padding:24px;
box-shadow:var(--shadow);
}

.section{
background:var(--soft);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
margin-bottom:18px;
}

.section-title{
font-size:15px;
font-weight:800;
color:var(--primary);
margin-bottom:14px;
display:flex;
align-items:center;
gap:8px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:16px;
}

.full{
grid-column:1 / -1;
}

.form-label{
display:block;
font-size:13px;
font-weight:700;
color:var(--dark);
margin-bottom:7px;
}

.form-control{
width:100%;
border:1px solid var(--border);
border-radius:12px;
background:#fff;
padding:12px 14px;
font-size:14px;
font-weight:600;
outline:none;
}

.form-control:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

.products-wrap{
display:flex;
flex-direction:column;
gap:14px;
}

.product-card{
background:#fff;
border:1px solid var(--border);
border-radius:18px;
padding:16px;
}

.product-head{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
margin-bottom:14px;
}

.product-title{
font-size:14px;
font-weight:800;
color:var(--dark);
}

.product-grid{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr auto;
gap:12px;
align-items:end;
}

.field{
min-width:0;
}

.amount-box{
background:var(--primary-soft);
}

.icon-btn{
border:none;
background:#fee2e2;
color:#b91c1c;
width:42px;
height:42px;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:800;
flex-shrink:0;
}

.add-row-btn{
margin-top:14px;
border:none;
background:var(--primary-soft);
color:var(--primary);
padding:12px 16px;
border-radius:12px;
font-weight:800;
cursor:pointer;
display:inline-flex;
align-items:center;
gap:8px;
}

.summary-bar{
margin-top:18px;
display:flex;
justify-content:flex-end;
}

.total-card{
background:var(--primary-soft);
border:1px solid #bfdbfe;
border-radius:16px;
padding:14px 18px;
min-width:250px;
}

.total-label{
font-size:13px;
font-weight:700;
color:#475569;
margin-bottom:4px;
}

.total-value{
font-size:26px;
font-weight:800;
color:var(--primary);
}

.button-group{
margin-top:24px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn-save{
background:var(--primary);
color:#fff;
border:none;
padding:13px 22px;
border-radius:12px;
font-weight:800;
cursor:pointer;
display:inline-flex;
align-items:center;
gap:8px;
}

.btn-cancel{
background:#e2e8f0;
color:#334155;
border:none;
padding:13px 20px;
border-radius:12px;
font-weight:800;
text-decoration:none;
display:inline-flex;
align-items:center;
justify-content:center;
}

@media(max-width:992px){
.product-grid{
grid-template-columns:repeat(2,minmax(0,1fr));
}
}

@media(max-width:768px){
.form-card{
padding:16px;
border-radius:18px;
}

.section{
padding:14px;
border-radius:14px;
}

.form-grid{
grid-template-columns:1fr;
}

.product-grid{
grid-template-columns:1fr;
}

.product-head{
align-items:flex-start;
flex-direction:column;
}

.summary-bar{
justify-content:stretch;
}

.total-card{
width:100%;
min-width:unset;
}

.button-group{
flex-direction:column;
}

.btn-save,
.btn-cancel,
.add-row-btn{
width:100%;
justify-content:center;
}

.page-title{
font-size:22px;
}
}
</style>

<div class="main-content">
    <div class="form-shell">

        <div class="page-header">
            <div>
                <div class="page-title">
                    <i class="fas fa-truck-loading"></i>
                    Add Supplier Purchase
                </div>
                <div class="page-sub">Create supplier and add multiple purchase items in one entry</div>
            </div>
        </div>

        <form method="POST" id="supplierForm">
            <input type="hidden" name="products_json" id="productsJson">

            <div class="form-card">

                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-user"></i>
                        Supplier Details
                    </div>

                    <div class="form-grid">
                        <div>
                            <label class="form-label">Supplier Name *</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter supplier name" required>
                        </div>

                        <div>
                            <label class="form-label">Mobile Number</label>
                            <input type="text" name="mobile" class="form-control" placeholder="Enter mobile number">
                        </div>

                        <div>
                            <label class="form-label">Bill No</label>
                            <input type="text" name="bill_no" class="form-control" placeholder="Enter bill number">
                        </div>

                        <div>
                            <label class="form-label">Date</label>
                            <input type="date" name="bill_date" class="form-control">
                        </div>

                        <div class="full">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control" rows="3" placeholder="Enter supplier address"></textarea>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-boxes"></i>
                        Purchase Items
                    </div>

                    <div id="productsWrap" class="products-wrap"></div>

                    <button type="button" class="add-row-btn" onclick="addProductCard()">
                        <i class="fas fa-plus"></i>
                        Add More Item
                    </button>

                    <div class="summary-bar">
                        <div class="total-card">
                            <div class="total-label">Total Purchase Amount</div>
                            <div class="total-value">₹<span id="grandTotal">0.00</span></div>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <a href="/suppliers" class="btn-cancel">Cancel</a>
                    <button type="button" class="btn-save" onclick="submitSupplierForm()">
                        <i class="fas fa-save"></i>
                        Save Supplier
                    </button>
                </div>

            </div>
        </form>
    </div>
</div>

<script>
function productCardTemplate(){
    return `
        <div class="product-card">
            <div class="product-head">
                <div class="product-title">Purchase Item</div>
                <button type="button" class="icon-btn" onclick="removeProductCard(this)">
                    <i class="fas fa-trash"></i>
                </button>
            </div>

            <div class="product-grid">
                <div class="field">
                    <label class="form-label">Item Name</label>
                    <input type="text" class="item-name form-control" placeholder="Enter item name">
                </div>

                <div class="field">
                    <label class="form-label">Unit</label>
                    <select class="unit form-control">
                        <option value="Kg">Kg</option>
                        <option value="Pcs">Pcs</option>
                        <option value="Bag">Bag</option>
                        <option value="Ton">Ton</option>
                        <option value="Box">Box</option>
                        <option value="Feet">Feet</option>
                        <option value="Meter">Meter</option>
                        <option value="Roll">Roll</option>
                        <option value="Sheet">Sheet</option>
                    </select>
                </div>

                <div class="field">
                    <label class="form-label">Qty</label>
                    <input type="number" step="0.01" class="qty form-control" placeholder="0" oninput="updateCardAmount(this)">
                </div>

                <div class="field">
                    <label class="form-label">Purchase Price</label>
                    <input type="number" step="0.01" class="purchase-price form-control" placeholder="0.00" oninput="updateCardAmount(this)">
                </div>

                <div class="field">
                    <label class="form-label">Selling Price</label>
                    <input type="number" step="0.01" class="selling-price form-control" placeholder="0.00">
                </div>

                <div class="field">
                    <label class="form-label">Stock Type</label>
                    <select class="stock-type form-control" onchange="toggleGstField(this)">
                        <option value="REGULAR">Regular Stock</option>
                        <option value="GST">GST Stock</option>
                    </select>
                </div>

                <div class="field gst-field" style="display:none;">
                    <label class="form-label">GST %</label>
                    <select class="gst-rate form-control" onchange="updateCardAmount(this)">
                        <option value="0">Select GST %</option>
                        <option value="5">5%</option>
                        <option value="12">12%</option>
                        <option value="18">18%</option>
                        <option value="28">28%</option>
                    </select>
                </div>

                <div class="field">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" class="amount form-control amount-box" placeholder="0.00" readonly>
                </div>
            </div>
        </div>
    `;
}

function addProductCard(){
    const wrap = document.getElementById("productsWrap");
    const div = document.createElement("div");
    div.innerHTML = productCardTemplate();
    wrap.appendChild(div.firstElementChild);
}

function removeProductCard(btn){
    const cards = document.querySelectorAll(".product-card");
    if(cards.length === 1){
        alert("At least one item required");
        return;
    }
    btn.closest(".product-card").remove();
    updateGrandTotal();
}
function toggleGstField(selectEl){
    const card = selectEl.closest(".product-card");
    const gstField = card.querySelector(".gst-field");
    const gstRate = card.querySelector(".gst-rate");

    if(selectEl.value === "GST"){
        gstField.style.display = "block";
    }else{
        gstField.style.display = "none";
        gstRate.value = "0";
    }

    updateCardAmount(selectEl);
}

function updateCardAmount(el){
    const card = el.closest(".product-card");
    const qty = parseFloat(card.querySelector(".qty").value) || 0;
    const purchase = parseFloat(card.querySelector(".purchase-price").value) || 0;
    const stockType = card.querySelector(".stock-type").value;
    const gstRate = parseFloat(card.querySelector(".gst-rate")?.value || 0);

    let baseAmount = qty * purchase;
    let totalAmount = baseAmount;

    if(stockType === "GST" && gstRate > 0){
        totalAmount = baseAmount + (baseAmount * gstRate / 100);
    }

    card.querySelector(".amount").value = totalAmount.toFixed(2);
    updateGrandTotal();
}

function updateGrandTotal(){
    let total = 0;
    document.querySelectorAll(".amount").forEach(inp=>{
        total += parseFloat(inp.value) || 0;
    });
    document.getElementById("grandTotal").innerText = total.toFixed(2);
}


function submitSupplierForm(){
    const supplierName = document.querySelector("input[name='name']").value.trim();

    if(!supplierName){
        alert("Please enter supplier name");
        return;
    }

    let products = [];
    let hasValidRow = false;

    document.querySelectorAll(".product-card").forEach(card=>{
        const item_name = card.querySelector(".item-name").value.trim();
        const unit = card.querySelector(".unit").value;
        const qty = card.querySelector(".qty").value;
        const purchase_price = card.querySelector(".purchase-price").value;
        const selling_price = card.querySelector(".selling-price").value;
        const stock_type = card.querySelector(".stock-type").value;
        const gst_rate = card.querySelector(".gst-rate").value;
        const amount = card.querySelector(".amount").value;

        if(item_name && qty){
            hasValidRow = true;
            products.push({
                item_name: item_name,
                unit: unit,
                qty: qty,
                purchase_price: purchase_price,
                selling_price: selling_price,
                stock_type: stock_type,
                gst_rate: gst_rate,
                amount: amount
            });
        }
    });

    if(!hasValidRow){
        alert("Please add at least one product");
        return;
    }

    document.getElementById("productsJson").value = JSON.stringify(products);
    document.getElementById("supplierForm").submit();
}


document.addEventListener("DOMContentLoaded", function(){
    addProductCard();
});
</script>
