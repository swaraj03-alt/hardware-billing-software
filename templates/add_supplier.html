{% include 'sidebar.html' %}

<style>

:root{
--bg:#f4f6fb;
--card:#ffffff;
--dark:#0f172a;
--muted:#64748b;
--primary:#2563eb;
--border:#e2e8f0;
--shadow:0 8px 25px rgba(0,0,0,.06);
}

/* PAGE LAYOUT */

body{
background:var(--bg);
font-family:'Plus Jakarta Sans',sans-serif;
}

.main-content{
margin-left:270px;
padding:30px;
min-height:100vh;
}

/* SIDEBAR MOBILE FIX */

@media(max-width:1100px){
.main-content{
margin-left:0;
padding-top:80px;
}
}

/* CARD */

.form-card{
background:var(--card);
border-radius:18px;
padding:32px;
box-shadow:var(--shadow);
max-width:820px;
margin:auto;
}

/* HEADER */

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:10px;
}

.page-title{
font-size:24px;
font-weight:800;
color:var(--dark);
}

/* GRID */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.full{
grid-column:1 / -1;
}

/* INPUTS */

.form-label{
font-weight:700;
font-size:14px;
color:var(--dark);
margin-bottom:6px;
display:block;
}

.form-control{
width:100%;
border-radius:10px;
border:1px solid var(--border);
padding:10px 12px;
font-weight:600;
}

.form-control:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

/* BUTTONS */

.button-group{
margin-top:25px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn-save{
background:var(--primary);
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.btn-cancel{
background:#f1f5f9;
color:#334155;
border:none;
padding:10px 18px;
border-radius:10px;
font-weight:700;
text-decoration:none;
}

.btn-save:hover{opacity:.9}

@media(max-width:768px){

.form-card{
padding:22px;
width:100%;
}

.form-grid{
grid-template-columns:1fr;
}

.page-title{
font-size:20px;
}

.button-group{
flex-direction:column;
}

.btn-save,
.btn-cancel{
width:100%;
text-align:center;
}

}

</style>

<div class="main-content">

<div class="form-card">

<div class="page-header">

<div class="page-title">
<i class="fas fa-user-plus"></i>
Add Supplier
</div>

</div>

<form method="POST">

<div class="form-grid">

<div>
<label class="form-label">Supplier Name *</label>
<input type="text"
name="name"
class="form-control"
placeholder="Enter supplier name"
required>
</div>

<div>
<label class="form-label">Mobile Number</label>
<input type="text"
name="mobile"
class="form-control"
placeholder="Enter mobile number">
</div>

<div>
<label class="form-label">Opening Balance(Old Khata)</label>
<input type="number"
step="0.01"
name="opening_balance"
class="form-control"
value="0">
</div>

<div class="full">
<label class="form-label">Address</label>
<textarea
name="address"
class="form-control"
rows="3"
placeholder="Enter supplier address"></textarea>
</div>

</div>

<div class="button-group">

<a href="/suppliers" class="btn-cancel">
Cancel
</a>

<button type="submit" class="btn-save">
<i class="fas fa-save"></i>
Save Supplier
</button>

</div>

</form>

</div>

</div>
