<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UPI Balance | SR Steel ERP</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#2563eb;
--success:#10b981;
--danger:#ef4444;
--dark:#0f172a;
--sidebar-width:270px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:
radial-gradient(circle at 10% 10%, #eef2ff 0%, transparent 40%),
linear-gradient(180deg,#f8fafc,#eef2f7);
color:var(--dark);
}

/* MAIN CONTAINER */

.main-container{
margin-left:var(--sidebar-width);
padding:40px 60px;
min-height:100vh;
display:flex;
flex-direction:column;
gap:25px;
}

/* HEADER */

.page-header{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(14px);
padding:25px 30px;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
}

.page-header h2{
font-size:22px;
font-weight:800;
}

/* FILTER BUTTONS */

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filters a{
padding:6px 14px;
border-radius:8px;
font-size:13px;
text-decoration:none;
font-weight:600;
background:#e5e7eb;
color:#111;
transition:.25s;
}

.filters a:hover{
background:#2563eb;
color:white;
}

.filters a.active{
background:#2563eb;
color:white;
}

/* KPI GRID */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
}

/* CARD */

.card{
background:linear-gradient(180deg,#ffffff,#f8fafc);
border-radius:20px;
padding:28px;
position:relative;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 25px 60px rgba(0,0,0,0.12);
}

.card::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:100%;
height:4px;
background:var(--primary);
}

/* TEXT */

.card h4{
font-size:12px;
text-transform:uppercase;
letter-spacing:1px;
color:#64748b;
margin-bottom:10px;
}

.value{
font-size:34px;
font-weight:800;
}

/* COLORS */

.received{
color:var(--primary);
}

.spent{
color:var(--danger);
}

.balance{
color:var(--success);
}

/* RESPONSIVE */

@media (max-width:1024px){

.main-container{
margin-left:0;
padding:20px;
}

.page-header{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

{% include 'sidebar.html' %}

<div class="main-container">

<!-- HEADER -->

<div class="page-header">

<h2>💳 UPI Account Summary</h2>

<div class="filters">

<a href="/upi-balance?type=today">Today</a>
<a href="/upi-balance?type=week">Week</a>
<a href="/upi-balance?type=month">Month</a>
<a href="/upi-balance">View All</a>

</div>

</div>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">

<h4>UPI Received</h4>

<div class="value received">
₹{{ "{:,.2f}".format(received) }}
</div>

</div>


<div class="card">

<h4>UPI Spent</h4>

<div class="value spent">
₹{{ "{:,.2f}".format(spent) }}
</div>

</div>


<div class="card">

<h4>UPI Balance</h4>

<div class="value balance">
₹{{ "{:,.2f}".format(balance) }}
</div>

</div>

</div>

</div>

</body>
</html>
