<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password | SR STEEL ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#f8fafc;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}
.box{
    background:#fff;
    padding:40px;
    border-radius:16px;
    width:380px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
h2{
    margin-bottom:20px;
    color:#0f172a;
}
input{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:16px;
    border:2px solid #e2e8f0;
    border-radius:10px;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:#fff;
    font-weight:700;
    cursor:pointer;
}
button:hover{
    background:#2563eb;
}
a{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#2563eb;
    text-decoration:none;
    font-size:14px;
}
.flash{
    background:#fef2f2;
    color:#ef4444;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="box">
<h2>Reset Password</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="flash">{{ message }}</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">
<label>Username</label>
<input type="text" name="username" required>

<label>New Password</label>
<input type="password" name="password" required>

<button type="submit">Update Password</button>
</form>

<a href="{{ url_for('login') }}">Back to Login</a>
</div>

</body>
</html>
